{% extends "base.html" %}

{% block body %}
<main class="login-shell">
    <section class="hero-panel">
        <div class="brand-lockup">
            <div class="brand-mark" aria-hidden="true">
                <span class="brand-orbit brand-orbit-a"></span>
                <span class="brand-orbit brand-orbit-b"></span>
                <span class="brand-core"></span>
            </div>
            <div>
                <p class="eyebrow">Gateway Control Plane</p>
                <h1>{{ product_name }}</h1>
            </div>
        </div>
        <div class="hero-stage" aria-hidden="true">
            <span class="hero-stage-line">WELCOME</span>
            <span class="hero-stage-line">BACK</span>
        </div>
    </section>

    <section class="auth-panel">
        <div class="auth-card">
            <div class="auth-head">
                <div>
                    <p class="eyebrow">Secure Access</p>
                    <h2>Sign in to the gateway</h2>
                </div>
                <div class="status-pill">
                    <span class="status-dot"></span>
                    Local console ready
                </div>
            </div>

            <form class="auth-form">
                <label class="field">
                    <span>Username</span>
                    <input type="text" name="username" placeholder="gateway" autocomplete="username">
                </label>

                <label class="field">
                    <span>Password</span>
                    <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password">
                </label>

                <div class="form-row">
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        <span>Keep this console trusted</span>
                    </label>
                    <a href="#" class="text-link">Need help?</a>
                </div>

                <p class="form-error" data-login-error></p>

                <button type="submit" class="primary-action">Enter Control Plane</button>
            </form>

            <div class="auth-foot">
                <div class="info-chip">Analytics</div>
                <div class="info-chip">Configuration</div>
                <div class="info-chip">Secure Transport</div>
            </div>
        </div>
    </section>
</main>
{% endblock %}
